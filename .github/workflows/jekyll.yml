  name: Build and Deploy Jekyll Site

  on:
    push:
      branches: ["main"]
    workflow_dispatch:

  permissions:
    contents: write
    pages: write
    id-token: write

  # Group condiviso con convert-webp.yml: serializza i due workflow per evitare
  # la race condition sul git push (entrambi committano sul main toccando i post).
  concurrency:
    group: "rossodisera-publish"
    cancel-in-progress: false

  jobs:
    build:
      runs-on: ubuntu-latest
      if: github.actor != 'github-actions[bot]'
      steps:
        - name: Checkout
          uses: actions/checkout@v5

        - name: Setup Ruby
          uses: ruby/setup-ruby@v1
          with:
            ruby-version: '3.3'
            bundler-cache: true

        - name: Fix smart quotes in front matter
          run: |
            python3 << 'PYTHON_SCRIPT'
            import os, re, json

            posts_dir = '_posts'
            replacements = {
                '\u201c': '"', '\u201d': '"',
                '\u2018': "'", '\u2019': "'",
                '\u200b': '', '\u200c': '', '\u200d': '', '\ufeff': '',
            }

            def fix_single_quoted_apostrophes(fm):
                """Re-quota gli scalari YAML single-quoted come stringhe double-quoted
                JSON-safe. Gestisce i valori che contengono apostrofi E virgolette doppie
                insieme (es. excerpt con l'inserimento e "Uccelli"), caso che la versione
                precedente saltava — lasciando il YAML rotto e la card vuota in home."""
                lines = fm.split('\n')
                result = []
                for line in lines:
                    m = re.match(r"^(\s*\w[\w_]*:\s*)'(.*)'(\s*)$", line)
                    if m:
                        key, value, trail = m.group(1), m.group(2), m.group(3)
                        # single-quoted è valido se ogni apostrofo interno è raddoppiato ('');
                        # se dopo aver rimosso le coppie resta un apostrofo singolo, il YAML è rotto.
                        if "'" in value.replace("''", ""):
                            unescaped = value.replace("''", "'")  # YAML: '' = apostrofo letterale
                            line = f'{key}{json.dumps(unescaped, ensure_ascii=False)}{trail}'
                    result.append(line)
                return '\n'.join(result)

            fixed = []

            for filename in os.listdir(posts_dir):
                if not filename.endswith('.md'):
                    continue
                path = os.path.join(posts_dir, filename)
                with open(path, encoding='utf-8') as f:
                    content = f.read()
                parts = content.split('---', 2)
                if len(parts) < 3:
                    continue
                fm = parts[1]
                fm_fixed = fm
                for bad, good in replacements.items():
                    fm_fixed = fm_fixed.replace(bad, good)
                fm_fixed = fix_single_quoted_apostrophes(fm_fixed)
                if fm_fixed != fm:
                    with open(path, 'w', encoding='utf-8') as f:
                        f.write('---' + fm_fixed + '---' + parts[2])
                    fixed.append(filename)
                    print(f'Fixed: {filename}')

            if not fixed:
                print('No issues found.')
            PYTHON_SCRIPT

        - name: Commit smart quotes fix
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add _posts/*.md
            if git diff --staged --quiet; then
              echo "Nothing to commit"
            else
              git commit -m "Fix: rimuove smart quotes dal front matter"
              git pull --rebase origin main
              git push
            fi

        - name: Setup Pages
          id: pages
          uses: actions/configure-pages@v5

        - name: Build with Jekyll
          run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
          env:
            JEKYLL_ENV: production

        - name: Upload artifact
          uses: actions/upload-pages-artifact@v4

    deploy:
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      runs-on: ubuntu-latest
      needs: build
      steps:
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v5

