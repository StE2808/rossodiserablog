<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hero debug</title>
<link rel="stylesheet" href="/assets/css/style.css">
<style>
#dbg{position:fixed;top:0;left:0;right:0;z-index:99999;background:#fff;color:#000;
font:11px/1.35 ui-monospace,Menlo,monospace;padding:6px 8px;white-space:pre-wrap;
max-height:70vh;overflow:auto;border-bottom:2px solid #000;margin:0}
</style>
</head>
<body>
<pre id="dbg">avvio…</pre>

<nav class="navbar">
  <a href="/" class="navbar-brand">
    <img src="/assets/images/logo_trasparenza.png" alt="Rosso di Sera" class="navbar-logo">
    <span class="navbar-title">Rosso di Sera</span>
  </a>
  <ul class="navbar-links"><li><a href="/">Home</a></li></ul>
  <button class="hamburger" aria-label="Menu"><span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span></button>
</nav>

<section class="hero">
  <div id="hero-tree-holder" class="hero-tree" aria-hidden="true"></div>
  <div class="hero-content">
    <p class="hero-subtitle">Un blog di pensiero critico</p>
    <p class="hero-tagline">Una luce nel mondo digitale</p>
    <a href="#articoli" class="hero-cta">Esplora gli articoli</a>
  </div>
  <div class="scroll-indicator"><span></span><p>Scorri</p></div>
</section>

<section class="articles-section" id="articoli" style="min-height:120vh"></section>

<script src="/assets/js/hero-tree.js" defer></script>
<script>
(function(){
  var box=document.getElementById('dbg'); var lines=[];
  function L(s){lines.push(s); box.textContent=lines.join('\n');}
  window.addEventListener('error',function(e){L('!!JSERR '+e.message+' @'+(e.filename||'').split('/').pop()+':'+e.lineno);});
  L('UA '+navigator.userAgent.replace('Mozilla/5.0 ',''));
  L('animate='+(typeof Element.prototype.animate==='function')+' reduced='+matchMedia('(prefers-reduced-motion: reduce)').matches+' vw='+innerWidth+' vh='+innerHeight);
  function num(v){return (typeof v==='string')?v.replace(/matrix\(|\)/g,'').split(',').map(function(x){return (+x).toFixed(3)}).join(','):v;}
  function snap(t){
    var svg=document.querySelector('#hero-tree-holder svg');
    var tg=svg&&svg.querySelector('.tree-g');
    var fb=document.querySelector('.hero-flybird');
    var cs=tg&&getComputedStyle(tg);
    var s='t'+t+' sway='+(tg?(tg.classList.contains('swaying')?'Y':'n'):'?')+' anim='+(cs?cs.animationName:'?')+' tr=['+(cs?num(cs.transform):'?')+']';
    if(fb){var f=getComputedStyle(fb);var r=fb.getBoundingClientRect();
      s+='\n   FLY tr=['+num(f.transform)+'] rect='+Math.round(r.left)+','+Math.round(r.top)+' '+Math.round(r.width)+'x'+Math.round(r.height);
    } else { s+=' FLY=none'; }
    L(s);
  }
  [300,4300,4500,4700,5600,5800,6100,6500,8600].forEach(function(t){setTimeout(function(){snap(t);},t);});
})();
</script>
</body>
</html>
